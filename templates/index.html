<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BharatProperty AI | Valuation Tool</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --main-blue: #1e3a8a; --accent-gold: #f59e0b; }
        body { background-color: #f8fafc; font-family: 'Inter', sans-serif; }
        .hero-banner { background: var(--main-blue); color: white; padding: 60px 0 100px; border-radius: 0 0 40px 40px; }
        .property-card { background: white; border-radius: 20px; border: none; margin-top: -60px; box-shadow: 0 20px 40px rgba(0,0,0,0.08); }
        .form-control, .form-select { border-radius: 10px; padding: 12px; border: 1px solid #e2e8f0; }
        .btn-calculate { background: var(--accent-gold); color: white; border: none; font-weight: 700; padding: 15px; border-radius: 12px; transition: 0.3s; }
        .btn-calculate:hover { background: #d97706; transform: translateY(-2px); }
        .result-display { background: #f0fdf4; border: 2px solid #bbf7d0; border-radius: 15px; }
    </style>
</head>
<body>

<div class="hero-banner text-center">
    <h1 class="fw-bold">BharatProperty AI <i class="fas fa-gem text-warning"></i></h1>
    <p class="opacity-75">Professional Real Estate Valuation based on Physical Property Data</p>
</div>

<div class="container mb-5">
    <div class="row justify-content-center">
        <div class="col-lg-9">
            <div class="card property-card p-4 p-md-5">
                <form action="/predict" method="post" class="row g-4">
                    <div class="col-md-12">
                        <h4 class="mb-3 text-dark fw-bold"><i class="fas fa-building me-2 text-primary"></i>Enter Property Specs</h4>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label fw-bold small text-muted">TOTAL BUILT-UP AREA (Sq. Ft.)</label>
                        <div class="input-group">
                            <span class="input-group-text bg-white"><i class="fas fa-vector-square"></i></span>
                            <input type="number" name="area" class="form-control" placeholder="e.g. 1500" required>
                        </div>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label fw-bold small text-muted">CONFIGURATION (BHK)</label>
                        <select name="bhk" class="form-select" required>
                            <option value="1">1 BHK</option>
                            <option value="2" selected>2 BHK</option>
                            <option value="3">3 BHK</option>
                            <option value="4">4+ BHK</option>
                        </select>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label fw-bold small text-muted">PROPERTY AGE (YEARS)</label>
                        <input type="number" name="age" class="form-control" placeholder="e.g. 2" required>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label fw-bold small text-muted">NUMBER OF BATHROOMS</label>
                        <input type="number" name="bath" class="form-control" placeholder="e.g. 2" required>
                    </div>

                    <div class="col-12 mt-4">
                        <button type="submit" class="btn btn-calculate w-100 text-uppercase shadow">Get Instant Valuation</button>
                    </div>
                </form>

                {% if prediction_text %}
                <div class="result-display mt-5 p-4 text-center">
                    <p class="text-uppercase text-success fw-bold small mb-1">Estimated Market Value</p>
                    <h1 class="display-4 fw-bold text-dark">{{ prediction_text }}</h1>
                    <div class="mt-3 text-muted">
                        <span class="badge bg-white text-dark border me-2">{{ area }} Sq. Ft.</span>
                        <span class="badge bg-white text-dark border">{{ bhk }} BHK</span>
                    </div>
                </div>
                {% endif %}
            </div>
        </div>
    </div>
</div>

<footer class="text-center py-5">
    <p class="text-muted small">© 2026 BharatProperty Predictor | Built with Python Linear Regression</p>
</footer>

</body>
</html>
